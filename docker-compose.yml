version: '3.8'

services:
  order-service:
    build: .
    container_name: order-service
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - PORT=3000

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    restart: unless-stopped